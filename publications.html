    <!-- Simplified JavaScript for theme switching only -->
    <!-- This version will still prioritize a user's manual click, -->
    <!-- but it will also react if a new visitor changes their OS theme -->
    <!-- while the page is open.  However, if the user clicks the theme switch -->
    <!-- the choice will be saved and be sticky -->
    <!-- it was further modified to eliminate theme flash during loarding -->

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const toggleSwitch = document.querySelector(
          '.theme-switch input[type="checkbox"]',
        );
        const logoImage = document.getElementById("logo-image");

        // Central function to update all visual elements based on a theme
        function syncVisuals(theme) {
          toggleSwitch.checked = theme === "dark";
          if (logoImage) {
            logoImage.src =
              theme === "dark" ? "pics/logo-light.svg" : "pics/logo-dark.svg";
          }
        }

        // Central function to apply a theme to the document
        function applyTheme(theme) {
          document.documentElement.setAttribute("data-theme", theme);
          syncVisuals(theme);
        }

        // Handles what happens when a user manually clicks the toggle
        function handleToggleClick(e) {
          const newTheme = e.target.checked ? "dark" : "light";
          localStorage.setItem("theme", newTheme); // Save the manual choice
          applyTheme(newTheme);
        }

        // --- Event Listeners ---

        // 1. Listen for clicks on the toggle
        toggleSwitch.addEventListener("change", handleToggleClick);

        // 2. THIS IS THE MERGED UPGRADE: Listen for real-time OS theme changes
        window
          .matchMedia("(prefers-color-scheme: dark)")
          .addEventListener("change", (e) => {
            // Only apply the change if the user has NOT made a manual choice
            if (!localStorage.getItem("theme")) {
              const newTheme = e.matches ? "dark" : "light";
              applyTheme(newTheme);
            }
          });

        // --- Initial Sync on Page Load ---
        // Get the current theme that the head script already set and sync the visuals
        const currentTheme =
          document.documentElement.getAttribute("data-theme");
        syncVisuals(currentTheme);
      });
    </script>
